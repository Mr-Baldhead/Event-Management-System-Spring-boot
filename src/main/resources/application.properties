spring.application.name=EventManagementSystem

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/spring
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security - Admin credentials
# Development defaults (override in production with environment variables)
# In production: Set ADMIN_USERNAME and ADMIN_PASSWORD as environment variables
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.EventManagementSystem=DEBUG
logging.level.org.springframework.security=DEBUG